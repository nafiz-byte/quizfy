<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unsubscribe — ThinkBattle</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Teko:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#00C566;--dark:#0A0F0D;--card:#161D19;--border:#1E2B23;--muted:#4A6057;--white:#F0FFF6;--red:#FF4F4F}
    body{background:var(--dark);color:var(--white);font-family:'Hind Siliguri',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:420px;text-align:center}
    .logo{font-family:'Teko',sans-serif;font-size:1.6rem;color:var(--green);margin-bottom:1.5rem;display:block;text-decoration:none}
    .logo span{color:var(--white)}
    .icon{font-size:3rem;margin-bottom:1rem}
    h2{font-family:'Teko',sans-serif;font-size:2rem;margin-bottom:.5rem}
    .sub{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem;line-height:1.6}
    .phone-badge{background:rgba(255,79,79,.1);border:1px solid rgba(255,79,79,.3);border-radius:100px;padding:.4rem 1rem;font-size:.88rem;color:var(--red);display:inline-block;margin-bottom:1.5rem}
    .warning{background:rgba(255,79,79,.07);border:1px solid rgba(255,79,79,.2);border-radius:10px;padding:1rem;font-size:.85rem;color:rgba(240,255,246,.7);margin-bottom:1.5rem;line-height:1.6}
    .btn-danger{width:100%;background:var(--red);color:var(--white);border:none;border-radius:8px;padding:.9rem;font-family:'Hind Siliguri',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:.7rem}
    .btn-cancel{width:100%;background:transparent;border:1px solid var(--border);color:var(--white);border-radius:8px;padding:.9rem;font-family:'Hind Siliguri',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;text-decoration:none;display:block}
    .btn-cancel:hover{border-color:var(--green);color:var(--green)}
  </style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">Think<span>Battle</span></a>
  <div class="icon">⚠️</div>
   <a href="/" style="color:#FF4F4F;font-size:.85rem;text-decoration:none;border:1px solid #FF4F4F;padding:.3rem .8rem;border-radius:6px;">✕UNSUBSCRIBE!</a>
  <p class="sub">আপনি কি সত্যিই ThinkBattle থেকে Unsubscribe করতে চান?</p>
  <div class="phone-badge">📱 {{ phone }}</div>
  <div class="warning">
    ⚠️ Unsubscribe করলে আপনার সকল অগ্রগতি মুছে যাবে এবং আপনাকে পুনরায় রেজিস্ট্রেশন করতে হবে।
  </div>
  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn-danger">হ্যাঁ, Unsubscribe করুন</button>
  </form>
  <a href="/" class="btn-cancel">না, ফিরে যান</a>
</div>
</body>
</html>
